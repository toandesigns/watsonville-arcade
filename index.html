<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Watsonville Arcade</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#ff8c42" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Arcade" />
<style>
  :root {
    --bg-1: #ffd56b;
    --bg-2: #ff8c42;
    --bg-3: #ff5d8f;
    --ink:  #2a1a3a;
    --cream: #fff8e8;
    --safari-1: #e6b86a;
    --safari-2: #66903a;
    --baseball-1: #7ec45b;
    --baseball-2: #c95a4a;
    --shadow: 0 16px 40px -10px rgba(42, 26, 58, 0.35);
    --font: "Fredoka", "Quicksand", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(70% 60% at 50% 0%, var(--bg-1) 0%, transparent 70%),
      radial-gradient(80% 70% at 80% 100%, var(--bg-3) 0%, transparent 70%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: contain;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  /* Floating star sparkles */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(2px 2px at 10% 12%, rgba(255,255,255,0.9), transparent 3px),
      radial-gradient(1.5px 1.5px at 28% 26%, rgba(255,255,255,0.7), transparent 3px),
      radial-gradient(2px 2px at 50% 18%, rgba(255,255,255,0.9), transparent 3px),
      radial-gradient(1.5px 1.5px at 72% 30%, rgba(255,255,255,0.75), transparent 3px),
      radial-gradient(2px 2px at 88% 14%, rgba(255,255,255,0.9), transparent 3px),
      radial-gradient(1.5px 1.5px at 18% 60%, rgba(255,255,255,0.6), transparent 3px),
      radial-gradient(2px 2px at 80% 70%, rgba(255,255,255,0.85), transparent 3px),
      radial-gradient(1.5px 1.5px at 38% 82%, rgba(255,255,255,0.7), transparent 3px),
      radial-gradient(2px 2px at 62% 92%, rgba(255,255,255,0.85), transparent 3px);
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: clamp(28px, 6vw, 56px) clamp(20px, 5vw, 40px) 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: clamp(28px, 5vw, 48px);
  }
  .badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(42, 26, 58, 0.12);
    color: var(--ink);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    font-size: clamp(44px, 10vw, 84px);
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-shadow: 0 4px 0 rgba(255,255,255,0.25);
    margin-bottom: 14px;
  }
  .lede {
    font-size: clamp(15px, 3vw, 18px);
    color: rgba(42, 26, 58, 0.78);
    max-width: 32ch;
    margin: 0 auto;
    font-weight: 500;
  }

  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: clamp(18px, 4vw, 28px);
    margin-top: clamp(28px, 5vw, 40px);
  }
  .game {
    position: relative;
    display: block;
    text-decoration: none;
    color: var(--ink);
    border-radius: 32px;
    padding: 28px 24px 24px;
    min-height: 280px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer;
  }
  .game:hover {
    transform: translateY(-4px);
    box-shadow: 0 22px 50px -10px rgba(42, 26, 58, 0.45);
  }
  .game:active { transform: translateY(0); }

  .game.safari {
    background:
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.20) 0%, transparent 50%),
      linear-gradient(160deg, var(--safari-1) 0%, var(--safari-2) 100%);
  }
  .game.baseball {
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.22) 0%, transparent 50%),
      linear-gradient(160deg, var(--baseball-1) 0%, var(--baseball-2) 100%);
  }

  .game .scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: 32px;
    pointer-events: none;
  }
  /* Safari scene: acacia tree + sun + grass tufts */
  .game.safari .sun {
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff3c2 0%, #ffd76a 70%, transparent 100%);
    filter: blur(1px);
    opacity: 0.85;
  }
  .game.safari .tree {
    position: absolute;
    bottom: 10px; left: 14px;
    width: 90px; height: 110px;
  }
  .game.safari .grass {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 22px;
    background:
      radial-gradient(circle at 10% 100%, #4f7028 0 6px, transparent 7px),
      radial-gradient(circle at 30% 100%, #4f7028 0 6px, transparent 7px),
      radial-gradient(circle at 55% 100%, #4f7028 0 6px, transparent 7px),
      radial-gradient(circle at 78% 100%, #4f7028 0 6px, transparent 7px),
      radial-gradient(circle at 95% 100%, #4f7028 0 6px, transparent 7px),
      linear-gradient(to bottom, transparent 60%, #6e8a3a 100%);
  }
  /* Baseball scene: pitcher's mound + base */
  .game.baseball .field-mark {
    position: absolute;
    bottom: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 8px solid rgba(255,255,255,0.18);
  }
  .game.baseball .base {
    position: absolute;
    top: 30px; right: 30px;
    width: 28px; height: 28px;
    background: white;
    transform: rotate(45deg);
    opacity: 0.55;
    border-radius: 4px;
  }

  .game .label {
    position: relative;
    display: inline-block;
    background: rgba(255, 248, 232, 0.95);
    color: var(--ink);
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    z-index: 1;
  }
  .game h2 {
    position: relative;
    font-size: clamp(28px, 6vw, 40px);
    line-height: 1.05;
    font-weight: 700;
    margin-top: 14px;
    z-index: 1;
    color: white;
    text-shadow: 0 2px 0 rgba(0,0,0,0.12);
  }
  .game.safari h2 { color: #fff7e0; }
  .game.baseball h2 { color: #fff7e0; }
  .game p {
    position: relative;
    margin-top: 10px;
    z-index: 1;
    font-size: 15px;
    color: rgba(255,255,255,0.92);
    font-weight: 500;
    max-width: 28ch;
  }
  .game .play {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 22px;
    padding: 12px 22px;
    background: white;
    color: var(--ink);
    border-radius: 999px;
    font-weight: 700;
    font-size: 15px;
    box-shadow: 0 8px 18px -4px rgba(0,0,0,0.25);
    transition: transform 0.2s ease;
  }
  .game:hover .play { transform: translateY(-2px) scale(1.03); }

  .game .best {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 1;
    font-weight: 700;
    font-size: 12px;
    color: white;
    background: rgba(0,0,0,0.20);
    padding: 5px 10px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  .game .best.zero { display: none; }

  footer {
    margin-top: clamp(32px, 6vw, 56px);
    text-align: center;
    font-size: 12px;
    color: rgba(42, 26, 58, 0.55);
    font-weight: 500;
  }

  @media (max-width: 460px) {
    .games { gap: 16px; }
    .game { min-height: 240px; padding: 22px 20px 20px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <span class="badge">Welcome to</span>
    <h1>Watsonville Arcade</h1>
  </header>

  <div class="games">
    <a class="game safari" href="safari/?v=2" aria-label="Play Dakota's Safari">
      <div class="scene" aria-hidden="true">
        <div class="sun"></div>
        <!-- Acacia tree -->
        <svg class="tree" viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
          <path d="M44 110 L44 50" stroke="#4a3520" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path d="M44 60 L20 50" stroke="#4a3520" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M44 65 L68 55" stroke="#4a3520" stroke-width="4" stroke-linecap="round" fill="none"/>
          <ellipse cx="44" cy="38" rx="42" ry="14" fill="#3d5a1f"/>
          <ellipse cx="44" cy="32" rx="36" ry="11" fill="#4f7028"/>
        </svg>
        <div class="grass"></div>
      </div>
      <span class="label">Axolotl · Safari</span>
      <span class="best zero" data-best="safari">Best 0</span>
      <h2>Dakota's<br/>Safari</h2>
      <p>Wander the savanna as a pink axolotl and spot all the animals.</p>
      <span class="play">Play →</span>
    </a>

    <a class="game baseball" href="baseball/?v=2" aria-label="Play Atlas' Baseball Pong">
      <div class="scene" aria-hidden="true">
        <div class="field-mark"></div>
        <div class="base"></div>
      </div>
      <span class="label">Pong · Baseball</span>
      <span class="best zero" data-best="baseball">Best 0</span>
      <h2>Atlas'<br/>Baseball Pong</h2>
      <p>Swing the bat. Don't let the ball hit the dirt.</p>
      <span class="play">Play →</span>
    </a>
  </div>

  <footer>Made with ❤️ on toan.design</footer>
</div>

<script>
  /* Show each game's best score from localStorage on the tile. */
  ['safari', 'baseball'].forEach(key => {
    const el = document.querySelector(`[data-best="${key}"]`);
    const best = Number(localStorage.getItem(`arcade-best-${key}`) || 0);
    if (best > 0) {
      el.textContent = `Best ${best}`;
      el.classList.remove('zero');
    }
  });
</script>

</body>
</html>
